<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wanted Gang</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:white;
padding:40px 20px;
}

.container{
max-width:1200px;
margin:auto;
}

.search-box{
width:100%;
max-width:500px;
margin:0 auto 40px;
display:flex;
}

.search-box input{
width:100%;
padding:18px;
background:#111;
border:1px solid #2c2c2c;
border-radius:12px;
color:white;
font-size:16px;
outline:none;
}

.tabs{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:50px;
flex-wrap:wrap;
}

.tab{
padding:14px 30px;
background:#161616;
border:1px solid #333;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.tab:hover{
background:white;
color:black;
}

.title{
font-size:38px;
font-weight:700;
margin-bottom:40px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
}

.card{
background:#101010;
border:1px solid #2a2a2a;
border-top:4px solid #ffb300;
border-radius:16px;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 20px rgba(255,179,0,0.25);
}

.left{
display:flex;
align-items:center;
gap:15px;
}

.avatar{
width:60px;
height:60px;
border-radius:50%;
background:url('https://i.imgur.com/2DhmtJ4.png');
background-size:cover;
background-position:center;
}

.info h3{
font-size:22px;
margin-bottom:5px;
}

.info p{
color:#aaa;
font-size:14px;
}

.fb-btn{
width:48px;
height:48px;
border-radius:50%;
background:#1f1f1f;
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
font-size:20px;
color:white;
transition:0.3s;
}

.fb-btn:hover{
background:#1877f2;
}

@media(max-width:768px){

.title{
font-size:28px;
}

}

</style>
</head>
<body>

<div class="container">

<div class="search-box">
<input type="text" placeholder="Search member name...">
</div>

<div class="tabs">
<div class="tab">Members Wanted</div>
</div>

<h1 class="title">📁 Wasted</h1>

<div class="cards">

<div class="card">
<div class="left">
<div class="avatar"></div>

<div class="card">
<div class="left">
<div class="avatar"></div>

<div class="info">
<h3>Sagorfiw Wantedf</h3>
<p>https://www.facebook.com/profile.php?id=61572145379953</p>
</div>
</div>

<a class="fb-btn" href="#">f</a>
</div>
